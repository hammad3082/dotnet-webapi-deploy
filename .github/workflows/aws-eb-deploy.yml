name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - aws_elasticbeanstalk_release
    paths-ignore:
      - "**/*.md"
      - "screenshots/**"
      - '.github/**'
      - 'docs/**'
      - 'README.md'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build -c Release

      - name: Publish
        run: dotnet publish -c Release -o ./publish --no-build

      - name: Zip artifact
        run: |
          cd publish
          zip -r ../app.zip .
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: aws s3 cp app.zip s3://${{ secrets.EB_S3_BUCKET }}/app.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APPLICATION_NAME }} \
            --version-label github-${{ github.sha }} \
            --source-bundle S3Bucket={{ secrets.EB_S3_BUCKET }},S3Key=app.zip

          aws elasticbeanstalk update-environment \
            --environment-name ${{ secrets.EB_ENVIRONMENT_NAME }} \
            --version-label github-${{ github.sha }}
